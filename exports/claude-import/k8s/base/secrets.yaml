---
# Note: In production, use Sealed Secrets or external secret management
# This is a template - actual secrets should never be committed to git
apiVersion: v1
kind: Secret
metadata:
  name: sunzi-cerebro-secrets
  namespace: sunzi-cerebro
  labels:
    app: sunzi-cerebro
type: Opaque
stringData:
  # JWT Secret (replace with strong random string)
  JWT_SECRET: "CHANGE_ME_sunzi-cerebro-jwt-secret-production-key"

  # Database Encryption Key
  DB_ENCRYPTION_KEY: "CHANGE_ME_32-char-encryption-key"

  # Redis Password
  REDIS_PASSWORD: "CHANGE_ME_redis-password"

  # Notion API Token
  NOTION_TOKEN: "ntn_T142672354291rL8erwWrk4rxchg1FEsMPqn4KGkWpN8vV"

  # OpenAI API Key (optional)
  OPENAI_API_KEY: "sk-CHANGE_ME"

  # Anthropic API Key (optional)
  ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"

  # Session Secret
  SESSION_SECRET: "CHANGE_ME_session-secret-key"

  # VAPID Keys for Push Notifications
  VAPID_PUBLIC_KEY: "BEl62iUYgUivxIkv69yViEuiBIa-Ib37J8XjqWqFuPv3T6WZZuNq0DPWUqn0jzqXNb5GmPgHkj5tWxYj3F8pDnI"
  VAPID_PRIVATE_KEY: "CHANGE_ME_vapid-private-key"

