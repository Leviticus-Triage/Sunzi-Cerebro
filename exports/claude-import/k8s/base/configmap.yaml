---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sunzi-cerebro-backend-config
  namespace: sunzi-cerebro
  labels:
    app: sunzi-cerebro
    component: backend
data:
  NODE_ENV: "production"
  PORT: "8890"
  LOG_LEVEL: "info"

  # Database Configuration
  DB_TYPE: "sqlite"
  DB_PATH: "/data/sunzi_cerebro.sqlite"

  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # MCP Configuration
  MCP_GOD_MODE_ENABLED: "true"
  HEXSTRIKE_ENABLED: "true"
  ATTACKMCP_ENABLED: "true"
  NOTION_ENABLED: "true"

  # Performance Settings
  MAX_WORKERS: "4"
  REQUEST_TIMEOUT: "300000"
  BODY_LIMIT: "50mb"

  # Monitoring
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"

  # Logging
  LOG_FORMAT: "json"
  LOG_DESTINATION: "stdout"

  # Cache Settings
  CACHE_TTL: "3600"
  ENABLE_CACHING: "true"

  # Rate Limiting
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sunzi-cerebro-frontend-config
  namespace: sunzi-cerebro
  labels:
    app: sunzi-cerebro
    component: frontend
data:
  VITE_API_BASE_URL: "https://api.sunzi-cerebro.com"
  VITE_WS_URL: "wss://api.sunzi-cerebro.com/ws"
  VITE_ENVIRONMENT: "production"
  VITE_PWA_ENABLED: "true"
  VITE_ENABLE_ANALYTICS: "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: sunzi-cerebro
  labels:
    app: sunzi-cerebro
    component: nginx
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 50M;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript
                   application/json application/javascript application/xml+rss
                   application/rss+xml font/truetype font/opentype
                   application/vnd.ms-fontobject image/svg+xml;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
        limit_req_zone $binary_remote_addr zone=general_limit:10m rate=500r/m;

        upstream backend {
            least_conn;
            server backend-service:8890 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        server {
            listen 80;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            # Security
            server_tokens off;

            # API proxy
            location /api/ {
                limit_req zone=api_limit burst=20 nodelay;

                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;

                proxy_connect_timeout 300s;
                proxy_send_timeout 300s;
                proxy_read_timeout 300s;
            }

            # WebSocket proxy
            location /ws {
                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_read_timeout 86400;
            }

            # Static files with caching
            location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # Service worker - no cache
            location /service-worker.js {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                expires 0;
            }

            # SPA fallback
            location / {
                limit_req zone=general_limit burst=50 nodelay;
                try_files $uri $uri/ /index.html;
            }

            # Health check
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
        }
    }
