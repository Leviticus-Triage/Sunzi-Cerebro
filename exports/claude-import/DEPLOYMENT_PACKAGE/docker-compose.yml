# Sunzi Cerebro Enterprise - Complete Stack Docker Compose
# All-in-One Deployment for Complete AI Security Platform
# Version: 3.4.0 Enterprise Production

version: '3.8'

services:
  # ===== FRONTEND SERVICES =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: sunzi-cerebro-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8890
      - REACT_APP_WS_URL=ws://backend:8890/ws
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - sunzi-network
    volumes:
      - frontend-build:/app/build
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===== BACKEND SERVICES =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: sunzi-cerebro-backend
    restart: unless-stopped
    ports:
      - "8890:8890"
    environment:
      - NODE_ENV=production
      - PORT=8890
      - DATABASE_URL=sqlite:///app/data/sunzi_cerebro.sqlite
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=sunzi-cerebro-enterprise-production-secret-2025
      - SESSION_SECRET=sunzi-session-secret-production-2025
      - CORS_ORIGIN=http://localhost:3000,http://frontend:3000
      - MCP_HEXSTRIKE_URL=http://hexstrike-ai:8888
      - MCP_ATTACKMCP_URL=http://attackmcp:8889
      - MCP_GODMODE_URL=http://mcp-god-mode:8887
      - PROMETHEUS_ENABLED=true
    depends_on:
      - redis
      - database
    networks:
      - sunzi-network
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8890/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===== DATABASE SERVICES =====
  database:
    image: postgres:16-alpine
    container_name: sunzi-cerebro-database
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sunzi_cerebro
      - POSTGRES_USER=sunzi_admin
      - POSTGRES_PASSWORD=sunzi_secure_password_2025
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
    networks:
      - sunzi-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunzi_admin -d sunzi_cerebro"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: sunzi-cerebro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - sunzi-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===== MCP SECURITY SERVERS =====
  hexstrike-ai:
    build:
      context: ./mcp-servers/hexstrike-ai
      dockerfile: Dockerfile
    container_name: sunzi-hexstrike-ai
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - HEXSTRIKE_PORT=8888
      - HEXSTRIKE_DEBUG=false
      - HEXSTRIKE_LOG_LEVEL=INFO
    networks:
      - sunzi-network
    volumes:
      - hexstrike-data:/app/data
      - hexstrike-tools:/app/tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  attackmcp:
    build:
      context: ./mcp-servers/attackmcp
      dockerfile: Dockerfile
    container_name: sunzi-attackmcp
    restart: unless-stopped
    ports:
      - "8889:8889"
    environment:
      - ATTACKMCP_PORT=8889
      - ATTACKMCP_MODE=production
    networks:
      - sunzi-network
    volumes:
      - attackmcp-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8889/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  mcp-god-mode:
    build:
      context: ./mcp-servers/mcp-god-mode
      dockerfile: Dockerfile
    container_name: sunzi-mcp-god-mode
    restart: unless-stopped
    ports:
      - "8887:8887"
    environment:
      - NODE_ENV=production
      - MCP_SERVER_NAME=mcp-god-mode
      - MCP_PORT=8887
    networks:
      - sunzi-network
    volumes:
      - godmode-data:/app/data
      - godmode-tools:/app/tools
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8887/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  # ===== MONITORING SERVICES =====
  prometheus:
    image: prom/prometheus:latest
    container_name: sunzi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - sunzi-network
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: sunzi-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=sunzi_grafana_admin_2025
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - sunzi-network
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== REVERSE PROXY & SSL =====
  nginx:
    image: nginx:alpine
    container_name: sunzi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - sunzi-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - frontend-build:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===== NETWORKS =====
networks:
  sunzi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===== VOLUMES =====
volumes:
  # Frontend
  frontend-build:
    driver: local

  # Backend
  backend-data:
    driver: local
  backend-logs:
    driver: local
  backend-uploads:
    driver: local

  # Database
  postgres-data:
    driver: local
  redis-data:
    driver: local

  # MCP Servers
  hexstrike-data:
    driver: local
  hexstrike-tools:
    driver: local
  attackmcp-data:
    driver: local
  godmode-data:
    driver: local
  godmode-tools:
    driver: local

  # Monitoring
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ===== CONFIGURATION =====
# To deploy the complete stack:
# 1. docker-compose up -d
# 2. Wait for all services to be healthy
# 3. Access frontend: http://localhost:3000
# 4. Access Grafana: http://localhost:3001 (admin/sunzi_grafana_admin_2025)
# 5. Access Prometheus: http://localhost:9090
#
# For production deployment:
# 1. Update all passwords and secrets
# 2. Configure SSL certificates in nginx/ssl/
# 3. Update CORS_ORIGIN for your domain
# 4. Consider using external database for scalability