name: Backend Test Suite

on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  workflow_dispatch: # Allow manual trigger

env:
  NODE_ENV: test
  JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test-jwt-secret-for-ci' }}
  DB_STORAGE: ':memory:'
  LOG_LEVEL: error
  CI: true

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]
      fail-fast: false

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 🔧 Install Dependencies
        working-directory: backend
        run: |
          npm ci
          npm ls --depth=0

      - name: 🧪 Run Test Suite
        working-directory: backend
        run: |
          chmod +x scripts/test-runner.js
          npm run test:ci
        continue-on-error: false

      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            backend/test-reports/
            backend/coverage/
          retention-days: 30

      - name: 📈 Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.node-version == '20.x'
        with:
          directory: backend/coverage/
          fail_ci_if_error: false
          verbose: true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 🔍 Run Security Audit
        working-directory: backend
        run: |
          npm audit --audit-level=moderate
          npm audit --output=json > security-audit.json || true

      - name: 📊 Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-report
          path: backend/security-audit.json
          retention-days: 30

  performance-check:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 🔧 Install Dependencies
        working-directory: backend
        run: npm ci

      - name: 🚀 Run Performance Tests
        working-directory: backend
        run: |
          npm run test -- --testPathPattern=performance.test.js --verbose
        env:
          NODE_ENV: test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: sunzi_cerebro_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 🔧 Install Dependencies
        working-directory: backend
        run: npm ci

      - name: 🗃️ Run Integration Tests with PostgreSQL
        working-directory: backend
        run: |
          npm run test -- --testPathPattern=database.test.js --verbose
        env:
          NODE_ENV: test
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sunzi_cerebro_test
          DB_USER: testuser
          DB_PASS: testpass

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 🔧 Install Dependencies
        working-directory: backend
        run: npm ci

      - name: 🏗️ Verify Build
        working-directory: backend
        run: |
          npm run build
          npm run lint
          echo "✅ Build verification completed"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security-audit, build-check]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: staging
      url: https://staging.sunzi-cerebro.com

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Staging
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add actual deployment steps here
          echo "✅ Staging deployment completed"

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [test, security-audit, performance-check, integration-test, build-check]
    if: always()

    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🧪 Backend Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Check | ${{ needs.performance-check.result == 'success' && '✅ Passed' || needs.performance-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Check | ${{ needs.build-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Node.js Versions Tested:** 18.x, 20.x" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Backend Test Suite Results')
            );

            const testStatus = '${{ needs.test.result }}';
            const securityStatus = '${{ needs.security-audit.result }}';
            const buildStatus = '${{ needs.build-check.result }}';

            const overallStatus = testStatus === 'success' && securityStatus === 'success' && buildStatus === 'success' ? '✅' : '❌';

            const commentBody = `## ${overallStatus} Backend Test Suite Results

            | Component | Status |
            |-----------|--------|
            | Unit Tests | ${testStatus === 'success' ? '✅' : '❌'} |
            | Security Audit | ${securityStatus === 'success' ? '✅' : '❌'} |
            | Build Verification | ${buildStatus === 'success' ? '✅' : '❌'} |

            **Test Coverage:** Available in artifacts
            **Performance:** Benchmarks completed

            <details>
            <summary>View Details</summary>

            - **Commit:** \`${{ github.sha }}\`
            - **Branch:** \`${{ github.ref_name }}\`
            - **Node.js:** 18.x, 20.x
            - **Database:** SQLite (in-memory), PostgreSQL (integration)

            </details>
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }