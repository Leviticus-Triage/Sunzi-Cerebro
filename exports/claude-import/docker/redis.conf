# Redis Configuration for Sunzi Cerebro Enterprise
# Production-optimized configuration with security and performance tuning

################################## NETWORK #####################################

# Accept connections from Docker network
bind 0.0.0.0

# Disable protected mode since we're in a Docker environment
protected-mode no

# Port configuration
port 6379

# TCP listen backlog
tcp-backlog 511

# TCP keepalive
tcp-keepalive 300

################################# TLS/SSL ######################################

# TLS/SSL disabled for internal Docker communication
# Enable only if external access is required

################################# GENERAL #####################################

# Run as daemon
daemonize no

# Process supervision
supervised no

# PID file location
pidfile /var/run/redis/redis-server.pid

# Server verbosity level
loglevel notice

# Log file location
logfile ""

# System logger
syslog-enabled no

# Number of databases
databases 16

# Show Redis logo on startup
always-show-logo yes

################################ SNAPSHOTTING  ################################

# Save the DB on disk
save 900 1      # Save if at least 1 key changed in 900 seconds
save 300 10     # Save if at least 10 keys changed in 300 seconds
save 60 10000   # Save if at least 10000 keys changed in 60 seconds

# Compress string objects in dump.rdb
rdbcompression yes

# Checksum the RDB file
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# RDB and AOF directory
dir /data

################################# REPLICATION #################################

# Replication settings (for future clustering)
# replica-serve-stale-data yes
# replica-read-only yes
# repl-diskless-sync no
# repl-diskless-sync-delay 5

################################## SECURITY ###################################

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command EVAL ""
rename-command DEBUG ""
rename-command SHUTDOWN SHUTDOWN_SECURE

# Password authentication (use environment variable)
# requirepass your_redis_password_here

# Command renaming for security
rename-command CONFIG SUNZI_CONFIG

################################### CLIENTS ####################################

# Max concurrent clients
maxclients 10000

############################## MEMORY MANAGEMENT #############################

# Maximum memory usage (adjust based on container limits)
maxmemory 1gb

# Memory eviction policy
maxmemory-policy allkeys-lru

# Memory usage samples for LRU/LFU algorithms
maxmemory-samples 5

# Active memory defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

############################# LAZY FREEING ####################################

lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

############################ KERNEL OOM CONTROL ##############################

# OOM score adjustment
oom-score-adj no

############################## APPEND ONLY MODE ###############################

# Enable AOF persistence for durability
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF sync policy
appendfsync everysec

# Disable AOF rewriting during RDB snapshot
no-appendfsync-on-rewrite no

# Auto AOF rewrite configuration
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF file on startup
aof-load-truncated yes

# Use mixed RDB/AOF persistence
aof-use-rdb-preamble yes

################################ LUA SCRIPTING  ###############################

# Lua script timeout
lua-time-limit 5000

################################## SLOW LOG ###################################

# Slow query log
slowlog-log-slower-than 10000
slowlog-max-len 128

################################ LATENCY MONITOR ##############################

# Latency monitoring
latency-monitor-threshold 100

############################# EVENT NOTIFICATION ##############################

# Keyspace notifications for expired keys and events
notify-keyspace-events "Ex"

############################### ADVANCED CONFIG ###############################

# Hash table configuration
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List configuration
list-max-ziplist-size -2
list-compress-depth 0

# Set configuration
set-max-intset-entries 512

# Sorted set configuration
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog configuration
hll-sparse-max-bytes 3000

# Stream configuration
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer limit
client-query-buffer-limit 1gb

# Protocol buffer limit
proto-max-bulk-len 512mb

# Frequency of hash table rehashing
hz 10

# Enable dynamic HZ
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB incremental fsync
rdb-save-incremental-fsync yes

# Jemalloc background thread
jemalloc-bg-thread yes

################################# MODULES #####################################

# Load Redis modules (if needed)
# loadmodule /path/to/redis-module.so

################################# PERFORMANCE ##################################

# IO threads for networking (Redis 6+)
io-threads 4
io-threads-do-reads yes

# Disable expensive operations during loading
loading-process-events-interval-bytes 2097152

################################# MONITORING ##################################

# Enable stat collection
# Used by monitoring tools
rdbchecksum yes

################################# DEBUGGING ###################################

# Log queries slower than specified microseconds
# Useful for performance analysis
slowlog-log-slower-than 10000

# Watch memory usage patterns
watchdog-period 0

################################# CLUSTER ####################################

# Cluster mode disabled for single instance
# cluster-enabled no