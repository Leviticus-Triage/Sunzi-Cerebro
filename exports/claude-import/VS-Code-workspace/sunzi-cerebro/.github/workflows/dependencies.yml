name: Dependency Updates

on:
  schedule:
    - cron: '0 0 * * 1' # Jeden Montag um Mitternacht
  workflow_dispatch: # Ermöglicht manuelle Ausführung

jobs:
  update-deps:
    name: Update Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Check for updates (Frontend)
        working-directory: ./frontend
        run: |
          npm outdated
          npx npm-check-updates --target minor

      - name: Check for updates (Backend)
        working-directory: ./backend
        run: |
          npm outdated
          npx npm-check-updates --target minor

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update dependencies'
          title: '⬆️ Update dependencies'
          body: |
            Automatisches Update der Dependencies

            - [ ] Tests durchführen
            - [ ] Changelog überprüfen
            - [ ] Breaking Changes beachten
          branch: deps/update
          delete-branch: true
          labels: dependencies
